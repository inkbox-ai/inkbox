name: Lint & Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            sdk/python/pyproject.toml
            sdk/python/uv.lock

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      # See the rationale above the typescript-tests step. 80% is the
      # realistic sustainable bar across both SDKs at this stage.
      - name: Run Python tests
        run: pytest --cov --cov-report=term-missing --cov-fail-under=80

  typescript-tests:
    name: TypeScript Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npx tsc --noEmit

      - name: Run TypeScript tests
        run: npx vitest run --coverage --coverage.thresholds.lines=80

  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/rust
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: sdk/rust

      - name: Build (default + tunnels-runtime)
        run: |
          cargo build
          cargo build --features tunnels-runtime

      - name: Run tests (default features)
        run: cargo test

      - name: Run tests (tunnels-runtime)
        run: cargo test --features tunnels-runtime

      - name: Clippy
        run: cargo clippy --all-targets --features tunnels-runtime -- -D warnings

      - name: Format check
        run: cargo fmt --check
