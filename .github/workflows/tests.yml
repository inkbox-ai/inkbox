name: Lint & Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            sdk/python/pyproject.toml
            sdk/python/uv.lock

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Run Python tests
        run: pytest --cov --cov-report=term-missing --cov-fail-under=75

  typescript-tests:
    name: TypeScript Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npx tsc --noEmit

      - name: Run TypeScript tests
        run: npx vitest run --coverage --coverage.thresholds.lines=75

  trigger-integration-tests:
    needs: [python-tests, typescript-tests]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.INTEGRATION_APP_ID }}
          private-key: ${{ secrets.INTEGRATION_APP_PRIVATE_KEY }}
          owner: inkbox-ai

      - name: Trigger integration tests
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: inkbox-ai/integration-tests
          event-type: run-integration-tests
          client-payload: '{"inkbox_ref": "${{ github.head_ref || github.ref_name }}"}'
